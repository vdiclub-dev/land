<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colixo - Livraison rapide en Suisse</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0a0a0a;
    color: white;
    text-align: center;
}

.hero {
    position: relative;
}

.hero video {
    width: 100%;
    height: 100vh;
    object-fit: cover;
}

.overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

h1 {
    font-size: 2.5em;
}

button {
    background: orange;
    border: none;
    padding: 15px 25px;
    font-size: 18px;
    cursor: pointer;
    margin-top: 20px;
}

.section {
    padding: 50px 20px;
}

.form {
    background: #111;
    padding: 30px;
}

input, textarea {
    width: 80%;
    padding: 10px;
    margin: 10px;
}

</style>
</head>

<body>

<!-- HERO VIDEO -->
<div class="hero">
    <video autoplay muted loop>
        <source src="video-colixo.mp4" type="video/mp4">
    </video>

    <div class="overlay">
        <h1>Vos livraisons vous font perdre du temps ?</h1>
        <p>Colixo simplifie votre logistique</p>
        <button onclick="scrollToForm()">Demander un devis</button>
    </div>
</div>

<!-- BENEFICES -->
<div class="section">
    <h2>Pourquoi choisir Colixo ?</h2>
    <p>✔ Collecte directe chez vous</p>
    <p>✔ Livraison rapide en Suisse</p>
    <p>✔ Réduction des coûts</p>
</div>

<!-- CTA -->
<div class="section">
    <h2>Gagnez du temps dès aujourd’hui</h2>
    <button onclick="scrollToForm()">Obtenir mon devis</button>
</div>

<!-- FORMULAIRE -->
<div class="section form" id="form">
    <h2>Demande de devis</h2>

    <input type="text" placeholder="Nom / Entreprise"><br>
    <input type="email" placeholder="Email"><br>
    <textarea placeholder="Votre besoin"></textarea><br>

    <button>Envoyer</button>
</div>

<script>
function scrollToForm() {
    document.getElementById('form').scrollIntoView({ behavior: 'smooth' });
}
</script>

</body>
</html>
